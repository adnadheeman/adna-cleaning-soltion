<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Adna Cleaning</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-sidebar">
            <div>
                <a href="index.html" class="nav-brand" style="color: white;">
                    <div class="icon-box" style="background: white; color: var(--primary);">
                        <i class="fas fa-hand-sparkles"></i>
                    </div>
                    Adna Cleaning
                </a>
            </div>
            
            <div style="margin-top: auto; margin-bottom: auto;">
                <h1 style="font-size: 3rem; margin-bottom: 24px; color: white;">Welcome Back</h1>
                <p style="font-size: 1.2rem; opacity: 0.9;">Sign in to access your dashboard and manage your cleaning operations securely.</p>
            </div>
            
            <div>
                <p style="font-size: 0.9rem; opacity: 0.7;">&copy; 2026 Adna Cleaning Solution. All rights reserved.</p>
            </div>
        </div>
        
        <div class="auth-content">
            <div class="auth-form-container">
                <div class="role-tabs">
                    <div class="role-tab active" id="tab-admin" onclick="switchRole('admin')">Admin Login</div>
                    <div class="role-tab" id="tab-staff" onclick="switchRole('staff')">Staff Login</div>
                </div>
                
                <h2 style="margin-bottom: 8px;" id="form-title">Admin Login</h2>
                <p style="color: var(--text-muted); margin-bottom: 32px;" id="form-subtitle">Enter your admin credentials to continue.</p>
                
                <form id="loginForm" action="admin.html" method="GET">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div style="position: relative;">
                            <i class="fas fa-user" style="position: absolute; left: 16px; top: 14px; color: var(--text-muted);"></i>
                            <input type="text" class="form-control" style="padding-left: 48px;" placeholder="Enter your username" required>
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 12px;">
                        <label class="form-label">Password</label>
                        <div style="position: relative;">
                            <i class="fas fa-lock" style="position: absolute; left: 16px; top: 14px; color: var(--text-muted);"></i>
                            <input type="password" class="form-control" style="padding-left: 48px;" placeholder="Enter your password" required>
                        </div>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" style="color: var(--primary); font-size: 0.9rem; font-weight: 500;">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Sign In <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                
                <div style="text-align: center; margin-top: 32px;">
                    <a href="index.html" style="color: var(--text-muted); font-size: 0.9rem;">
                        <i class="fas fa-arrow-left"></i> Back to Website
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchRole(role) {
            // Update tabs
            document.getElementById('tab-admin').classList.remove('active');
            document.getElementById('tab-staff').classList.remove('active');
            document.getElementById('tab-' + role).classList.add('active');
            
            // Update text and form action
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const form = document.getElementById('loginForm');
            
            if (role === 'admin') {
                title.textContent = 'Admin Login';
                subtitle.textContent = 'Enter your admin credentials to continue.';
                form.action = 'admin.html';
            } else {
                title.textContent = 'Staff Login';
                subtitle.textContent = 'Enter your staff credentials to continue.';
                form.action = 'staff.html';
            }
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
